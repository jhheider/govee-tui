[package]
name = "govee-api2"
version = "0.1.0"
edition = "2021"
authors = ["Jacob Heider <jacob@jhheider.com>"]
license = "MIT OR Apache-2.0"
description = "Rust client for Govee's v2 router-based API with support for devices and groups"
repository = "https://github.com/jhheider/govee-tui"
documentation = "https://docs.rs/govee-api2"
readme = "README.md"
keywords = ["govee", "smart-home", "iot", "api-client"]
categories = ["api-bindings"]
rust-version = "1.70"

[features]
default = ["rustls-tls"]
# TLS backends - choose one
rustls-tls = ["reqwest/rustls-tls"]
native-tls = ["reqwest/native-tls"]

[dependencies]
reqwest = { version = "0.11", default-features = false, features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["macros"] }

[dev-dependencies]
tokio-test = "0.4"
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }
